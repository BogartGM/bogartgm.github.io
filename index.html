<!-- Rama cliente-formulario -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cotizaciones Pape</title>
    <link rel="stylesheet" href="./css_bootstrap/bootstrap.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <script src="./js/xlsx.full.min.js"></script>
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-12">
          <h1 class="h1">Cotizaciones</h1>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 overflow-auto p-2">
          <!-- Input búsqueda -->
          <div class="input-group sticky-top bg-light">
            <input type="text" class="form-control" aria-label="Buscar producto" placeholder="Buscar producto" id="search-bar" autocomplete="off" disabled />

            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">Excel</button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <label class="dropdown-item">
                  Elegir excel
                  <input type="file" class="d-none" id="file-input" />
                </label>
              </li>
              <li>
                <button class="dropdown-item" type="button">Reestablecer a Excel</button>
              </li>
            </ul>
          </div>
          <!-- Fin de Input búsqueda -->
          <!-- Inicio de  dropzone-->
          <div id="products-container">
            <div id="dropzone" class="d-flex align-items-center justify-content-center zone">
              <div>
                <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-file-text">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                  <line x1="16" y1="13" x2="8" y2="13"></line>
                  <line x1="16" y1="17" x2="8" y2="17"></line>
                  <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <p>Haz clic para seleccionar el excel</p>
              </div>
            </div>
          </div>
          <!-- Fin de dropzone -->
        </div>
        <div class="col-md-4 overflow-auto p-2">
          <!-- Accordion -->
          <div class="accordion" id="accordionFlushExample">
            <div class="accordion-item">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed p-2" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">Datos cliente</button>
              </h2>
              <div id="flush-collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionFlushExample">
                <div class="accordion-body p-1">
                  <!-- Formulario -->
                  <div class="mb-3">
                    <label for="" class="form-label">Nombre</label>
                    <div class="input-group">
                      <input type="text" class="form-control" id="" placeholder="Nombre" />
                      <input type="text" class="form-control" id="" placeholder="Grado y grupo" />
                    </div>
                  </div>
                  <div class="mb-3">
                    <label for="" class="form-label">Fecha</label>
                    <div class="input-group">
                      <form class="form-floating">
                        <input type="date" class="form-control" id="" />
                        <label for="">Fecha de cotización</label>
                      </form>
                      <button class="btn btn-outline-secondary" type="button">Hoy</button>
                      <form class="form-floating">
                        <input type="date" class="form-control" id="" disabled />
                        <label for="">Válida hasta</label>
                      </form>
                    </div>
                  </div>
                  <div class="mb-3">
                    <label for="" class="form-label">Descuento</label>
                    <div class="input-group">
                      <input type="text" class="form-control" id="" placeholder="Descuento" value="10" />
                      <span class="input-group-text" id="basic-addon1">%</span>
                    </div>
                  </div>
                  <!-- Fin de formulario -->
                </div>
              </div>
            </div>
          </div>
          <!-- Fin de acordeon -->

          <div class="d-flex align-items-center justify-content-center zone-image">
            <div>
              <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="currentColor" class="bi bi-file-earmark-image" viewBox="0 0 16 16">
                <path d="M6.502 7a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3" />
                <path d="M14 14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zM4 1a1 1 0 0 0-1 1v10l2.224-2.224a.5.5 0 0 1 .61-.075L8 11l2.157-3.02a.5.5 0 0 1 .76-.063L13 10V4.5h-2A1.5 1.5 0 0 1 9.5 3V1z" />
              </svg>
              <p>Haz clic para seleccionar la imagen</p>
            </div>
          </div>
        </div>
        <div class="col-md-4 overflow-auto p-2"></div>
      </div>
    </div>

    <script src="./js/main.js" type="module"></script>
    <script src="./js_bootstrap/popper.js"></script>
    <script src="./js_bootstrap/bootstrap.js"></script>
  </body>
</html>
