<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renta compu pape</title>
    <link rel="stylesheet" href="./css/vendor/bootstrap.css" />
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <nav class="container">
      <ul class="nav nav-tabs" id="myTab" role="tablist">
        <div class="nav-item" role="presentation">
          <button
            id="aplication"
            class="nav-link active"
            data-bs-toggle="tab"
            data-bs-target="#aplication-pane"
            type="button"
            role="tab"
            aria-controls="aplication-pane"
            aria-selected="true"
          >
            Renta computadora
          </button>
        </div>
        <div class="nav-item" role="presentation">
          <button
            id="history"
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#history-pane"
            type="button"
            role="tab"
            aria-controls="history-pane"
            aria-selected="false"
          >
            Historial
          </button>
        </div>
        <div class="nav-item" role="presentation">
          <button
            id="panico"
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#history-pane"
            type="button"
            role="tab"
            aria-controls="history-pane"
            aria-selected="false"
          >
            Historial
          </button>
        </div>
      </ul>
    </nav>
    <main class="container">
      <div class="p-2 border border-secondary-subtle rounded-2">
        <div class="tab-content" id="myTabContent">
          <div
            class="tab-pane fade show active"
            id="aplication-pane"
            role="tabpanel"
            aria-labelledby="aplication"
            tabindex="0"
          >
            <div id="accordion-rent-data" class="accordion">
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button
                    class="accordion-button p-1"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#rent-data"
                    aria-expanded="true"
                    aria-controls="rent-data"
                  >
                    Datos de renta
                  </button>
                </h2>
                <div
                  id="rent-data"
                  class="accordion-collapse collapse show"
                  data-bs-parent="#accordion-rent-data"
                >
                  <div class="accordion-body">
                    <div class="container">
                      <div class="row justify-content-between">
                        <div class="col-md-6">
                          <div class="form-floating">
                            <input
                              id="computer-name"
                              type="text"
                              class="form-control"
                              placeholder="Nombre"
                              value="Computadora 1"
                            />
                            <label for="computer-name">
                              Nombre computadora
                            </label>
                          </div>
                        </div>
                        <div class="col-md-2">
                          <div class="input-group">
                            <span class="input-group-text">$</span>
                            <div class="form-floating">
                              <input
                                id="rent-price"
                                type="number"
                                class="form-control"
                                placeholder="Nombre"
                                value="10"
                                min="1"
                                max="1000"
                              />
                              <label for="rent-price"> Precio/Hora </label>
                            </div>
                          </div>
                        </div>
                        <div class="col-md-2">
                          <div class="input-group">
                            <div class="form-floating">
                              <input
                                id="hour-selector"
                                class="form-control"
                                type="number"
                                value="00"
                                min="0"
                                max="23"
                              />
                              <label for="hour-selector">Horas</label>
                            </div>
                            <div class="form-floating">
                              <input
                                id="minute-selector"
                                class="form-control"
                                type="number"
                                value="00"
                                min="0"
                                max="59"
                              />
                              <label for="minute-selector">Minutos</label>
                            </div>
                            <button
                              type="button"
                              class="btn btn-sm btn-danger"
                              data-bs-toggle="popover"
                              data-bs-title="Tiempo libre"
                              data-bs-content="Si los minutos y horas es 0, el tiempo será libre"
                            >
                              ?
                            </button>
                          </div>
                        </div>
                        <div class="col-md-2 align-self-center">
                          <button
                            id="rentar"
                            type="button"
                            class="btn btn-primary py-3"
                          >
                            Rentar
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div
            id="history-pane"
            class="tab-pane fade"
            role="tabpanel"
            aria-labelledby="history"
            tabindex="0"
          >
            Aquí no hay nada por exceso de estrés
          </div>
        </div>
        <div>
          <div
            class="bg-primary-subtle border rounded-1 container-fluid mt-4 mb-2 text-secondary-subtle"
          >
            <span>Computadoras rentadas</span>
          </div>
          <div id="temporizadores"></div>
        </div>
      </div>
    </main>
    <!-- Modal -->
    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-body">
            <p>
              Asomaquina, pasomaquina aquí tienes el ese coso de eso
              pasumaquina. El diseño se fue de sabático
            </p>
            <div>
              <span>Computadora: </span
              ><span id="computadora-rentada">Computadora 1</span>
            </div>
            <div>
              <span>Precio/Hora: </span><span id="precio-rentado">$10</span>
            </div>
            <div>
              <span>Tiempo pedido: </span
              ><span id="tiempo-pedido-rentado">01:00:00</span>
            </div>
            <div>
              <span>Tiempo transcurrido: </span
              ><span id="tiempo-transcurrido-rentado">00:00:00</span>
            </div>
            <div><span>Cobrar: </span><span id="cobrar-rentado">0</span></div>
            <button class="cerrar">
              Detener sonido
            </button>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary cerrar"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/vendor/popper.js"></script>
    <script src="./js/vendor/bootstrap.js"></script>
    <script src="./js/main.js" type="module"></script>
    <script>
      const popoverTriggerList = document.querySelectorAll(
        '[data-bs-toggle="popover"]'
      );
      const popoverList = [...popoverTriggerList].map(
        (popoverTriggerEl) => new bootstrap.Popover(popoverTriggerEl)
      );
    </script>
  </body>
</html>
